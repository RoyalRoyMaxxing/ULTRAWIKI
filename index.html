<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavGames - Main Page</title>
    <link rel="stylesheet" href="access/css/index.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="left__side__header">
            <div class="logo">
                <h1>ULTRAWIKI</h1>
                <img src="access/img/Logo.jpg" alt="" class="logo__img">
            </div>
            <nav class="navbar">
                <a href="index.html" class="nav__link">Trang chủ</a>
                <a href="enemy.html" class="nav__link">Kẻ địch</a>
                <a href="weapon.html" class="nav__link">Vũ khí</a>
            </nav>
        </div>
        <div class="right__side__header">
            <input type="text" id="search-bar" placeholder="Search for a game...">
            <div class="account">
                <img src="access/img/ryou yamada avatar.jpg" alt="" class="account__avatar">
                <h1 id="Username">Ryou</h1>
            </div>
        </div>
    </header>
    <!-- main content -->
    <div class="main__container container">
        <img src="access/img/background.jpg" alt="" class="background__img">

        <section class="intro-card">
            <h1>Chào mừng tới với ULTRAWIKI!</h1>
            <p class="subheading">Trang web Ultra-mate để bạn tìm hiểu về các kẻ thù và vũ khí!</p>
            <div class="button-group">
            </div>
        </section>

        <section class="game-list-section">
            <h2 class="category-label">Husk</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid husk"></div>
            </div>

            <h2 class="category-label">Demons</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid demons"></div>
            </div>

            <h2 class="category-label">Machines</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid machines"></div>
            </div>

            <h2 class="category-label">Angels</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid angels"></div>
            </div>

            <h2 class="category-label">Prime Soul</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid prime-soul"></div>
            </div>

            <h2 class="category-label">Vũ khí</h2>
            <div class="game-carousel">
                <button class="carousel-btn prev" aria-label="Previous card">&#10094;</button>
                <button class="carousel-btn next" aria-label="Next card">&#10095;</button>
                <div class="game-grid weapons"></div>
            </div>

            
        </section>
    </div>
    <footer class="footer">
        <p>&copy; 2026 FavGames. All rights reserved.</p>
        <nav class="navbar footer-nav">
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Contact</a>
            <a href="#" class="footer__link">Privacy Policy</a>
            <a href="#" class="footer__link">Terms of Service</a>
            <a href="#" class="footer__link">Github Page</a>
        </nav>
    </footer>
    <script src="access/js/index.js"></script>
    <script src="access/js/fetch.js"></script>
</body>
</html>
