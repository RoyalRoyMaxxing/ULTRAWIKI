<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRAWIKI - Đăng kí</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="left__side__header">
            <div class="logo">
                <h1>ULTRAWIKI</h1>
                <img src="../img/Logo.jpg" alt="ULTRAWIKI logo" class="logo__img">
            </div>
            <nav class="navbar">
                <a href="../../index.html" class="nav__link">Trang chủ</a>
                <a href="enemy.html" class="nav__link">Kẻ địch</a>
                <a href="weapon.html" class="nav__link">Vũ khí</a>
            </nav>
        </div>
        <div class="right__side__header">
            <input type="text" id="search-bar" placeholder="Search for a game...">
            <div class="account">
                <img src="../img/ryou yamada avatar.jpg" alt="User avatar" class="account__avatar">
                <h1 id="Username"></h1>
            </div>
        </div>
    </header>
    <div class="main__container">
        <img src="../img/background.jpg" alt="" class="background__img">
        <div class="login-card">
            <h1>Create Account</h1>
            <p class="subheading">Hãy cùng ULTRA-WIKI nào!</p>

            <form action="#" class="login-form" id="signup-form">
                <label for="name">Username</label>
                <input type="text" id="name" name="name" placeholder="Nhập username" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Mật khẩu" required>

                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Xem lại mật khẩu" required>
                <p class="form-message" id="signup-message"></p>

                <button type="submit" class="btn btn-primary">Đăng kí</button>
            </form>

            <p class="sign-up">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </p>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 FavGames. All rights reserved.</p>
        <nav class="navbar footer-nav">
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Contact</a>
            <a href="#" class="footer__link">Privacy Policy</a>
            <a href="#" class="footer__link">Terms of Service</a>
            <a href="#" class="footer__link">Github Page</a>
        </nav>
    </footer>
    <script src="../js/profile.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
