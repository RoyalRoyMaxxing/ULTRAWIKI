<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FavGames - Enemies</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <div class="left__side__header">
            <div class="logo">
                <h1>ULTRAWIKI</h1>
                <img src="../img/Logo.jpg" alt="ULTRAWIKI logo" class="logo__img">
            </div>
            <nav class="navbar">
                <a href="../../index.html" class="nav__link">Trang chủ</a>
                <a href="enemy.html" class="nav__link">Kẻ địch</a>
                <a href="weapon.html" class="nav__link">Vũ khí</a>
            </nav>
        </div>
        <div class="right__side__header">
            <input type="text" id="search-bar" placeholder="Search for a game...">
            <div class="account">
                <img src="../img/ryou yamada avatar.jpg" alt="User avatar" class="account__avatar">
                <h1 id="Username"></h1>
            </div>
        </div>
    </header>
    <!-- main content -->
    <div class="main__container container">
        <img src="../img/background.jpg" alt="" class="background__img">

        <section class="enemies-section">
            <h1>All Enemies</h1>
            <div id="enemies-list" class="enemies-grid"></div>
        </section>
    </div>
    <footer class="footer">
        <p>&copy; 2026 FavGames. All rights reserved.</p>
        <nav class="navbar footer-nav">
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Contact</a>
            <a href="#" class="footer__link">Privacy Policy</a>
            <a href="#" class="footer__link">Terms of Service</a>
